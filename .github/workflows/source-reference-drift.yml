name: Source reference drift

on:
  schedule:
    # Weekly source-reference drift check, Tuesday 19:17 UTC / Wednesday 04:17 KST.
    - cron: "17 19 * * 2"
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: Per-reference HTTP timeout in seconds.
        required: false
        default: "20"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v7

      - name: Run live source reference drift check
        run: |
          mkdir -p .datapan/ci
          python scripts/check-source-reference-drift.py \
            --timeout "${{ github.event.inputs.timeout_seconds || '20' }}" \
            --output .datapan/ci/source-reference-drift-live.json

      - name: Upload source reference drift report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-reference-drift-live
          path: .datapan/ci/source-reference-drift-live.json
          if-no-files-found: error
