name: Verify registry release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  schedule:
    # Weekly release-health check, Monday 18:17 UTC / Tuesday 03:17 KST.
    - cron: "17 18 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          path: datapan-registry
          lfs: true

      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          repository: StatPan/datapan-cli
          path: datapan-cli

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: datapan-cli/go.mod
          check-latest: true
          cache-dependency-path: datapan-cli/go.sum

      - name: Confirm registry LFS file is materialized
        run: |
          bytes="$(wc -c < datapan-registry/data/data-go-kr.registry.json)"
          echo "data-go-kr.registry.json bytes=${bytes}"
          test "${bytes}" -gt 100000000

      - name: Validate provider verification evidence
        working-directory: datapan-cli
        run: |
          mkdir -p ../datapan-registry/.datapan/ci/provider-summaries
          for provider in qnet epost ekape forest folk airport andong jeonju geoje humetro itfind korad naqs sisul uiryeong ulsan; do
            go run ./cmd/datapan catalog verify summary \
              --input "../datapan-registry/reports/${provider}-verification.json" \
              --output "../datapan-registry/.datapan/ci/provider-summaries/${provider}-verification-summary.json" \
              --json
          done
          go run ./cmd/datapan catalog verify summary \
            --input ../datapan-registry/reports/latest-verification.json \
            --output ../datapan-registry/.datapan/ci/latest-verification-summary.json \
            --json

      - name: Verify release manifest
        working-directory: datapan-cli
        run: |
          mkdir -p ../datapan-registry/.datapan/ci
          go run ./cmd/datapan catalog release verify \
            --manifest ../datapan-registry/manifest.json \
            --output ../datapan-registry/.datapan/ci/latest-release-verification.json \
            --json

      - name: Check release readiness
        working-directory: datapan-cli
        run: |
          go run ./cmd/datapan catalog release readiness \
            --manifest ../datapan-registry/manifest.json \
            --output ../datapan-registry/.datapan/ci/latest-release-readiness.json \
            --json

      - name: Check README current snapshot
        run: |
          readme="datapan-registry/README.md"
          coverage="datapan-registry/reports/coverage.json"
          verification="datapan-registry/reports/latest-verification-summary.json"
          provider_index="datapan-registry/data/provider-index.json"

          specs="$(jq -r '.summary.specs' "${coverage}")"
          operations="$(jq -r '.summary.operations' "${coverage}")"
          callable_operations="$(jq -r '.summary.callable_operations' "${coverage}")"
          callable_percent="$(jq -r '.summary.callable_operation_percent' "${coverage}")"
          registered_adapter_operations="$(jq -r '.summary.registered_adapter_operations' "${coverage}")"
          external_endpoint_operations="$(jq -r '.summary.external_endpoint_operations' "${coverage}")"
          external_adapter_percent="$(jq -r '.summary.external_adapter_coverage_percent' "${coverage}")"
          missing_adapter_hosts="$(jq -r '.summary.missing_adapter_hosts' "${coverage}")"
          split_status="$(jq -r '.split_readiness.status' "${provider_index}")"
          adapter_count="$(jq -r '.split_readiness.adapter_count' "${provider_index}")"
          verification_adapters="$(jq -r '.split_readiness.verification_capable_adapters' "${provider_index}")"
          call_adapters="$(jq -r '.split_readiness.call_capable_adapters' "${provider_index}")"
          evidence_total="$(jq -r '.summary.total' "${verification}")"
          evidence_verified="$(jq -r '.summary.verified' "${verification}")"
          evidence_failed="$(jq -r '.summary.failed' "${verification}")"
          evidence_skipped="$(jq -r '.summary.skipped' "${verification}")"

          grep -F -- "- Specs: \`${specs}\`" "${readme}"
          grep -F -- "- Operations: \`${operations}\`" "${readme}"
          grep -F -- "- Callable operations: \`${callable_operations}\` (\`${callable_percent}%\`)" "${readme}"
          grep -F -- "- External adapter coverage: \`${registered_adapter_operations}\` registered-adapter operations out of \`${external_endpoint_operations}\`" "${readme}"
          grep -F -- "external endpoint operations (\`${external_adapter_percent}%\`)" "${readme}"
          grep -F -- "- Missing external adapter hosts: \`${missing_adapter_hosts}\`" "${readme}"
          grep -F -- "- Provider split readiness: \`${split_status}\`" "${readme}"
          grep -F -- "(\`${adapter_count}\` adapters, \`${verification_adapters}\` verification-capable, \`${call_adapters}\` call-capable)" "${readme}"
          grep -F -- "- Runtime verification evidence: \`${evidence_total}\` bounded checks merged into" "${readme}"
          grep -F -- "\`${evidence_verified}\` verified, \`${evidence_failed}\` failed, \`${evidence_skipped}\`" "${readme}"

      - name: Check latest GitHub release is installable
        working-directory: datapan-cli
        run: |
          go run ./cmd/datapan catalog install datapan-registry \
            --registry "${RUNNER_TEMP}/datapan-installed-latest.registry.json" \
            --json
          DATAPAN_REGISTRY_PATH="${RUNNER_TEMP}/datapan-installed-latest.registry.json" \
            go run ./cmd/datapan doctor --json

      - name: Upload release health reports
        uses: actions/upload-artifact@v4
        with:
          name: datapan-registry-release-health
          path: datapan-registry/.datapan/ci/
          if-no-files-found: error
